name: pizza_repository
description: A repository package for pizza data in the food delivery app
version: 1.0.0
publish_to: 'none' # This is a local package, not for pub.dev

environment:
  sdk: ">=3.1.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # You can add HTTP client if you want to fetch data from backend
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true